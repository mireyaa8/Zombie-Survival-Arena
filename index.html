<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GameZombie - FSM Survival</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <div id="ui">
      <div class="top-bar">
        <div class="brand">
          <span class="dot"></span>
          <div>
            <h1>GameZombie</h1>
            <p>FSM Survival Mode</p>
          </div>
        </div>

        <div class="stats">
          <div class="stat">
            <span>Score</span>
            <strong id="scoreText">0</strong>
          </div>

          <div class="stat">
            <span>Level</span>
            <strong id="levelText">1</strong>
          </div>

          <div class="stat">
            <span>Ammo</span>
            <strong id="ammoText">12 / 12</strong>
          </div>
        </div>
      </div>

      <div class="health-card">
        <div class="health-label">
          <span>Health</span>
          <strong id="healthText">100%</strong>
        </div>

        <div class="health-track">
          <div id="healthFill"></div>
        </div>
      </div>

      <div class="controls">
        WASD Move · Mouse Aim · Click Shoot · R Reload/Restart · P Pause
      </div>
    </div>

    <div id="screenOverlay" class="screen-overlay active">
      <div class="menu-card">
        <h2 id="menuTitle">GameZombie</h2>
        <p id="menuText">
          Survive each level. Zombies use a finite state machine to patrol,
          chase, attack, flee, and die.
        </p>
        <button id="startButton">Start Game</button>
      </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script src="js/fsm.js"></script>
    <script src="js/particles.js"></script>
    <script src="js/player.js"></script>
    <script src="js/bullet.js"></script>
    <script src="js/enemy.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
